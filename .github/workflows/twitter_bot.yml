name: DeepTech Scanner Bot

on:
  schedule:
    # 매일 UTC 기준 12:30, 21:30 에 실행 
    # (미국 동부 시간 EST/EDT 기준 대략 아침 출근시간 7:30~8:30 AM, 퇴근시간 4:30~5:30 PM)
    - cron: '30 12,21 * * *'
  workflow_dispatch: # GitHub 웹에서 언제든지 수동으로 실행 가능

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 메인 스크립트 실행
        env:
          # GitHub 저장소의 Settings -> Secrets and variables -> Actions 에서 
          # 아래 이름과 동일하게 Repository secrets로 등록해주셔야 합니다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: |
          python src/main.py
